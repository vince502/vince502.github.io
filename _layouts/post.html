---
layout: default
---
<article class="post">
  <header>
    <h1>{{ page.title }}</h1>
    <p class="meta">{{ page.date | date: "%B %-d, %Y" }}{% if page.categories.size > 0 %} · {{ page.categories | join: ", " }}{% endif %}</p>
  </header>

  {{ content }}

  {% include comments.html %}
</article>
